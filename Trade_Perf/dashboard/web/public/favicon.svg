<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" stroke="#58a6ff" stroke-width="2.6" stroke-linecap="round">
  <!-- Wheel rim -->
  <circle cx="32" cy="32" r="14"/>
  <!-- Hub -->
  <circle cx="32" cy="32" r="3.5" fill="#58a6ff" stroke="none"/>
  <!-- Spokes (4 cardinal + 4 diagonal) extending past the rim to handles -->
  <line x1="32" y1="3"  x2="32" y2="18"/>
  <line x1="32" y1="46" x2="32" y2="61"/>
  <line x1="3"  y1="32" x2="18" y2="32"/>
  <line x1="46" y1="32" x2="61" y2="32"/>
  <line x1="11" y1="11" x2="22" y2="22"/>
  <line x1="42" y1="42" x2="53" y2="53"/>
  <line x1="11" y1="53" x2="22" y2="42"/>
  <line x1="42" y1="22" x2="53" y2="11"/>
  <!-- Handle knobs at the tips -->
  <circle cx="32" cy="3"  r="2.4" fill="#58a6ff" stroke="none"/>
  <circle cx="32" cy="61" r="2.4" fill="#58a6ff" stroke="none"/>
  <circle cx="3"  cy="32" r="2.4" fill="#58a6ff" stroke="none"/>
  <circle cx="61" cy="32" r="2.4" fill="#58a6ff" stroke="none"/>
  <circle cx="11" cy="11" r="2"   fill="#58a6ff" stroke="none"/>
  <circle cx="53" cy="11" r="2"   fill="#58a6ff" stroke="none"/>
  <circle cx="11" cy="53" r="2"   fill="#58a6ff" stroke="none"/>
  <circle cx="53" cy="53" r="2"   fill="#58a6ff" stroke="none"/>
</svg>
